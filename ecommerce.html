<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Web Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.hidden { display: none; }</style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-indigo-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold cursor-pointer" onclick="showSection('catalog-section')">🛒 QuickShop</h1>
        <div class="flex items-center space-x-4">
            <button id="admin-btn" onclick="showSection('admin-section')" class="hidden bg-yellow-500 hover:bg-yellow-600 px-3 py-1 rounded text-sm font-bold text-gray-900">Admin Panel</button>
            <button onclick="showSection('cart-section')" class="relative font-semibold">
                Cart (<span id="cart-count">0</span>)
            </button>
            <span id="user-display" class="text-sm font-medium"></span>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm font-semibold">Logout</button>
        </div>
    </nav>

    <div id="auth-section" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm mx-4">
            <h2 class="text-2xl font-bold mb-6 text-center text-indigo-600">Choose Login Role</h2>
            <div class="space-y-4">
                <button onclick="login('User')" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700">Login as Customer (User)</button>
                <button onclick="login('Admin')" class="w-full bg-gray-800 text-white p-3 rounded-lg font-bold hover:bg-gray-900">Login as Store Manager (Admin)</button>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 hidden" id="main-content">
        
        <section id="catalog-section" class="section">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Product Catalog</h2>
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </section>

        <section id="cart-section" class="section hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Your Shopping Cart</h2>
            <div class="bg-white p-6 rounded-lg shadow-md max-w-2xl mx-auto">
                <div id="cart-items" class="space-y-4 mb-6"></div>
                <div class="border-t pt-4 flex justify-between items-center mb-6">
                    <span class="text-lg font-bold">Total Amount:</span>
                    <span class="text-xl font-black text-indigo-600">₹<span id="cart-total">0</span></span>
                </div>
                <button onclick="checkout()" class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-lg font-bold transition">Place Order (Checkout)</button>
            </div>
        </section>

        <section id="admin-section" class="section hidden">
            <h2 class="text-2xl font-bold mb-6 text-red-600">Admin Dashboard</h2>
            
            <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                <h3 class="text-lg font-bold mb-4 text-gray-700">Add New Product</h3>
                <form id="product-form" onsubmit="addProduct(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="p-name" required class="p-2 border rounded" placeholder="Product Name">
                    <input type="number" id="p-price" required class="p-2 border rounded" placeholder="Price (INR)">
                    <input type="text" id="p-img" required class="p-2 border rounded" placeholder="Image URL (or paste any unsplash link)">
                    <button type="submit" class="bg-indigo-600 text-white p-2 rounded font-bold md:col-span-3 hover:bg-indigo-700">Save Product</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-lg font-bold mb-4 text-gray-700">Customer Orders (Order Tracking)</h3>
                <div id="admin-orders" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <script>
        // Default Sample Products Data
        const defaultProducts = [
            { id: 1, name: "Wireless Headphones", price: 2999, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" },
            { id: 2, name: "Smart Watch", price: 3499, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300" },
            { id: 3, name: "Gaming Mouse", price: 1199, img: "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=300" }
        ];

        let products = JSON.parse(localStorage.getItem('e_products')) || defaultProducts;
        let cart = [];
        let orders = JSON.parse(localStorage.getItem('e_orders')) || [];
        let currentRole = null;

        function login(role) {
            currentRole = role;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = `👤 ${role}`;
            
            if (role === 'Admin') {
                document.getElementById('admin-btn').classList.remove('hidden');
                showSection('admin-section');
            } else {
                document.getElementById('admin-btn').classList.add('hidden');
                showSection('catalog-section');
            }
            renderCatalog();
            renderAdminOrders();
        }

        function logout() {
            currentRole = null;
            cart = [];
            updateCartCount();
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');
        }

        function renderCatalog() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            products.forEach(p => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow hover:shadow-md transition flex flex-col justify-between">
                        <img src="${p.img}" alt="${p.name}" class="h-40 w-full object-cover rounded mb-4">
                        <div>
                            <h4 class="font-semibold text-gray-800">${p.name}</h4>
                            <p class="text-indigo-600 font-bold mt-1">₹${p.price}</p>
                        </div>
                        <button onclick="addToCart(${p.id})" class="mt-4 w-full bg-indigo-600 text-white py-2 rounded text-sm font-semibold hover:bg-indigo-700">Add to Cart</button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            updateCartCount();
            alert(`${item.name} added to cart!`);
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
            renderCart();
        }

        function renderCart() {
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            itemsDiv.innerHTML = '';
            let total = 0;

            if(cart.length === 0) {
                itemsDiv.innerHTML = '<p class="text-gray-500 text-center">Your cart is empty.</p>';
                totalSpan.innerText = '0';
                return;
            }

            cart.forEach((item, index) => {
                total += item.price;
                itemsDiv.innerHTML += `
                    <div class="flex justify-between items-center border-b pb-2">
                        <span>${item.name}</span>
                        <div class="flex items-center space-x-4">
                            <span class="font-bold">₹${item.price}</span>
                            <button onclick="removeFromCart(${index})" class="text-red-500 font-bold text-sm">X</button>
                        </div>
                    </div>
                `;
            });
            totalSpan.innerText = total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
        }

        function checkout() {
            if(cart.length === 0) return alert("Cart is empty!");
            
            const newOrder = {
                id: 'ORD' + Math.floor(Math.random() * 90000 + 10000),
                items: cart.map(i => i.name).join(', '),
                total: cart.reduce((sum, i) => sum + i.price, 0),
                status: 'Processing ⏳'
            };

            orders.push(newOrder);
            localStorage.setItem('e_orders', JSON.stringify(orders));
            cart = [];
            updateCartCount();
            alert(`Order Placed Successfully! Your Order ID is: ${newOrder.id}`);
            showSection('catalog-section');
            renderAdminOrders();
        }

        // Admin Logics
        function addProduct(e) {
            e.preventDefault();
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const img = document.getElementById('p-img').value;

            const newProduct = { id: Date.now(), name, price, img };
            products.push(newProduct);
            localStorage.setItem('e_products', JSON.stringify(products));
            
            document.getElementById('product-form').reset();
            renderCatalog();
            alert("Product Added successfully!");
        }

        function renderAdminOrders() {
            const div = document.getElementById('admin-orders');
            div.innerHTML = '';
            if(orders.length === 0) {
                div.innerHTML = '<p class="text-gray-500 text-center">No orders placed yet.</p>';
                return;
            }

            orders.forEach((o, index) => {
                div.innerHTML += `
                    <div class="border p-4 rounded-lg bg-gray-50 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm text-indigo-600">${o.id}</p>
                            <p class="text-sm text-gray-700"><b>Items:</b> ${o.items}</p>
                            <p class="text-sm"><b>Total:</b> ₹${o.total}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-bold px-2 py-1 rounded bg-blue-100 text-blue-800">${o.status}</span>
                            <button onclick="shipOrder(${index})" class="block mt-2 text-xs bg-green-600 text-white px-2 py-1 rounded font-bold">Mark as Shipped ✅</button>
                        </div>
                    </div>
                `;
            });
        }

        function shipOrder(index) {
            orders[index].status = 'Shipped / Out for Delivery 🚚';
            localStorage.setItem('e_orders', JSON.stringify(orders));
            renderAdminOrders();
        }
    </script>
</body>
</html>
